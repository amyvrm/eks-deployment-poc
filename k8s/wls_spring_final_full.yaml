# kubectl apply -f cluster_objects.yaml

apiVersion: v1
kind: Namespace
metadata:
  name: webapp

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: default-sa-namespace-admin
  namespace: webapp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: system:serviceaccount:webapp:default

---
apiVersion: v1
data:
  domain.properties: |
    DOMAIN_NAME=ProdDomain
    ADMIN_LISTEN_PORT=7001
    ADMIN_NAME=weblogic
    PRODUCTION_MODE=dev
    DEBUG_FLAG=true
    ADMINISTRATION_PORT_ENABLED=false
    ADMINISTRATION_PORT=9002
    # Env properties for this image
    ADMIN_HOST=AdminContainer
    MANAGED_SERVER_PORT=8001
    MANAGED_SERVER_NAME_BASE=MS
    CONFIGURED_MANAGED_SERVER_COUNT=2
    PRODUCTION_MODE_ENABLED=true
    CLUSTER_NAME=cluster1
    CLUSTER_TYPE=DYNAMIC
    DOMAIN_HOST_VOLUME=/Users/host/temp
  domain_security.properties: |
    username=weblogic
    password=logicweb321
kind: ConfigMap
metadata:
  name: wls-config
  namespace: webapp

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: weblogic-dep
  labels:
    app: exposed-apps
  namespace: webapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: exposed-apps
  template:
    metadata:
      labels:
        app: exposed-apps
    spec:
      containers:
        - name: weblogic
          image: 359075566003.dkr.ecr.ap-south-1.amazonaws.com/repo_images:weblogic-latest
          ports:
            - containerPort: 7001
          volumeMounts:
            - name: domain-properties
              mountPath: /u01/oracle/properties
      volumes:
        - name: domain-properties
          configMap:
            name: wls-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-dep
  labels:
    app: exposed-apps
  namespace: webapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: exposed-apps
  template:
    metadata:
      labels:
        app: exposed-apps
    spec:
      containers:
        - name: spring
          image: 359075566003.dkr.ecr.ap-south-1.amazonaws.com/repo_images:springshell
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Secret
metadata:
  name: smbcreds
  namespace: webapp
type: Opaque
data:
  username: VVNFUk5BTUU=
  password: UEFTU1dPUkQ=
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smb-server
  labels:
    app: exposed-apps
  namespace: webapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: exposed-apps
  template:
    metadata:
      name: smb-server
      labels:
        app: exposed-apps
    spec:
      nodeSelector:
        "kubernetes.io/os": linux
      containers:
        - name: smb-server
          image: dperson/samba:latest
          env:
            - name: PERMISSIONS
              value: "0777"
            - name: USERNAME
              valueFrom:
                secretKeyRef:
                  name: smbcreds
                  key: username
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smbcreds
                  key: password
          args:
            [
              "-u",
              "$(USERNAME);$(PASSWORD)",
              "-s",
              "share;/smbshare/;yes;no;no;all;none",
              "-p",
            ]
          volumeMounts:
            - mountPath: /smbshare
              name: data-volume
          ports:
            - containerPort: 445
      volumes:
        - name: data-volume
          hostPath:
            path: /home/FileShare/drive
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: weblogic-svc
  labels:
    name: weblogic-dep
    name: spring-dep
    name: smb-server
  namespace: webapp
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-eip-allocations: eipalloc-0c2f1fe52747b672e,eipalloc-02f1107666c7e878a
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    service.beta.kubernetes.io/aws-load-balancer-proxy-protocol: "*"

spec:
  ports:
    - name: wls
      port: 7001
      targetPort: 7001
      protocol: TCP
    - name: spring
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: samba-server
      port: 445
      targetPort: 445
      protocol: TCP
  type: LoadBalancer
  selector:
    app: exposed-apps
